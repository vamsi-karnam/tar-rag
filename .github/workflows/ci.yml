name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # As of v0.2.0 `tar-rag` is turnkey — every bundled adapter
          # and extractor (incl. openai) is a default dependency, so
          # only the [dev] extra is needed for the CI test environment.
          pip install -e ".[dev]"

      - name: Run tests (offline only)
        run: pytest tests/ -m "not live" -q

      - name: Lint
        run: ruff check tar_rag tests
